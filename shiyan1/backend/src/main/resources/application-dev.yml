# 开发环境配置
server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/example_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: ck85726913
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000

  # Redis配置（开发环境可选，使用本地缓存替代）
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0

  # 日志配置
  logging:
    level:
      root: INFO
      com.example.ruoyi: DEBUG

# JWT配置
jwt:
  secret: ruoyiSecretKeyForJwtTokenGeneration2024Dev
  expire: 7200  # 2小时

# Swagger配置（开发环境开启）
springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  api-docs:
    enabled: true
    path: /v3/api-docs

# 日志文件配置
logging:
  file:
    path: logs/dev
    name: logs/dev/ruoyi-dev.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"